databaseChangeLog:
  - changeSet:
      id: 001-create-hotel-table
      author: Stepan
      changes:
        - createTable:
            tableName: hotel
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: brand
                  type: varchar(100)
              - column:
                  name: address_house_number
                  type: varchar(50)
              - column:
                  name: address_street
                  type: varchar(255)
              - column:
                  name: address_city
                  type: varchar(100)
              - column:
                  name: address_country
                  type: varchar(100)
              - column:
                  name: address_post_code
                  type: varchar(20)
              - column:
                  name: contacts_phone
                  type: varchar(50)
              - column:
                  name: contacts_email
                  type: varchar(255)
              - column:
                  name: arrival_time_check_in
                  type: varchar(5)
              - column:
                  name: arrival_time_check_out
                  type: varchar(5)